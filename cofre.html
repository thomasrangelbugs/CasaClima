<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Permissions-Policy" content="geolocation=(self)">
  <meta name="theme-color" content="#08131f">
  <title>CasaClima | Cofre</title>
  <meta
    name="description"
    content="Página do cofre local para guardar logins, senhas, sites e observações."
  >
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%232f8fff'/%3E%3Cstop offset='1' stop-color='%23ff9f68'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='url(%23g)'/%3E%3Cpath d='M16 36c0-8.837 7.163-16 16-16 7.27 0 13.41 4.852 15.36 11.49 3.86.63 6.64 3.87 6.64 7.76 0 4.42-3.58 8-8 8H23c-3.866 0-7-3.134-7-7 0-2.09.918-3.966 2.374-5.25A9.96 9.96 0 0 1 16 36Z' fill='white' opacity='.95'/%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
  <link rel="preconnect" href="https://images.pexels.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="js/scene-head.js"></script>
  <link rel="stylesheet" href="css/bundle.css">
    <script src="js/scene-assets.js"></script>
  <script defer src="js/common.js"></script>
  <script defer src="js/vault.js"></script>
</head>
<body class="theme-dark user-dark has-weather-fade scene-ready page-cofre">
    <!-- @partial shell-top -->
    <!-- @partial header -->
<main>
      <section class="section page-content" id="cofre">
        <div class="section-heading reveal">
          <div>
            <p class="eyebrow">Cofre local</p>
            <h2>Itens salvos</h2>
          </div>
          <button class="button ghost slim" id="vaultLockButton" type="button" data-i18n="vault.lock">Bloquear cofre</button>
        </div>

        <section class="vault-gate glass reveal" id="vaultGate">
          <h3 data-i18n="vault.unlock">Desbloquear cofre</h3>
          <p class="hint">Suas senhas são criptografadas com AES-GCM e uma senha mestra local.</p>
          <form class="inline-form" id="vaultUnlockForm">
            <label class="field field--grow">
              <span data-i18n="vault.masterPassword">Senha mestra</span>
              <input id="vaultMasterPassword" type="password" minlength="6" required autocomplete="current-password">
            </label>
            <button class="button primary slim" type="submit" data-i18n="vault.unlock">Desbloquear cofre</button>
          </form>
          <hr>
          <h3 data-i18n="vault.setup">Criar cofre protegido</h3>
          <form class="vault-form" id="vaultSetupForm">
            <label class="field">
              <span data-i18n="vault.masterPassword">Senha mestra</span>
              <input id="vaultSetupPassword" type="password" minlength="6" required autocomplete="new-password">
            </label>
            <label class="field">
              <span>Confirmar senha</span>
              <input id="vaultSetupConfirm" type="password" minlength="6" required autocomplete="new-password">
            </label>
            <button class="button secondary slim" type="submit" data-i18n="vault.setup">Criar cofre protegido</button>
          </form>
        </section>

        <div class="vault-layout" id="vaultWorkspace" hidden>
          <article class="glass reveal">
            <div class="form-shell__intro">
              <h3>Novo acesso</h3>
            </div>
            <form class="vault-form" id="vaultForm">
              <label class="field">
                <span>Serviço</span>
                <input id="vaultServiceInput" type="text" placeholder="Netflix" required>
              </label>
              <label class="field">
                <span>Login</span>
                <input id="vaultUsernameInput" type="text" placeholder="email@exemplo.com" required>
              </label>
              <label class="field">
                <span>Senha</span>
                <input id="vaultPasswordInput" type="password" placeholder="Digite a senha" required>
              </label>
              <label class="field">
                <span>Site ou app</span>
                <input id="vaultUrlInput" type="url" placeholder="https://...">
              </label>
              <label class="field field--full">
                <span>Observações</span>
                <textarea id="vaultNotesInput" rows="3" placeholder="Ex.: perfil da sala, alterada em janeiro, usar autenticação em dois fatores."></textarea>
              </label>
              <button class="button primary slim" type="submit">Salvar acesso</button>
            </form>
          </article>

          <article class="glass reveal">
            <div class="block-heading">
              <div>
                <h3>Itens salvos</h3>
                <p>Pesquise pelo nome do serviço.</p>
              </div>
              <label class="search-inline">
                <span class="sr-only">Filtrar cofre</span>
                <input id="vaultFilterInput" type="text" placeholder="Buscar serviço">
              </label>
            </div>
            <div class="vault-grid" id="vaultList"></div>
          </article>
        </div>
      </section>
    </main>

        <!-- @partial footer -->
  <!-- @partial scripts-core -->
</body>
</html>
