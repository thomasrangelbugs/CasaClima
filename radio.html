<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Permissions-Policy" content="geolocation=(self)">
  <meta name="theme-color" content="#08131f">
  <title>CasaClima | Rádio</title>
  <meta
    name="description"
    content="Página de rádios com filtros por país, estado, cidade e gênero, mais favoritas."
  >
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%232f8fff'/%3E%3Cstop offset='1' stop-color='%23ff9f68'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='url(%23g)'/%3E%3Cpath d='M16 36c0-8.837 7.163-16 16-16 7.27 0 13.41 4.852 15.36 11.49 3.86.63 6.64 3.87 6.64 7.76 0 4.42-3.58 8-8 8H23c-3.866 0-7-3.134-7-7 0-2.09.918-3.966 2.374-5.25A9.96 9.96 0 0 1 16 36Z' fill='white' opacity='.95'/%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
  <link rel="preconnect" href="https://images.pexels.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="js/scene-head.js"></script>
  <link rel="stylesheet" href="css/bundle.css">
  <script src="js/scene-assets.js"></script>
  <script defer src="js/common.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
  <script defer src="js/radio.js"></script>
</head>
<body class="theme-dark user-dark has-weather-fade scene-ready page-radio">
    <!-- @partial shell-top -->
    <!-- @partial header -->
<main>
      <section class="section page-content" id="radio">
        <div class="section-heading reveal">
          <div>
            <p class="eyebrow">Rádio mundial</p>
            <h2>Busca por local e gênero</h2>
          </div>
        </div>

        <div class="radio-filters glass reveal">
          <form class="radio-search" id="radioSearchForm">
            <label class="field">
              <span>Buscar rádio</span>
              <input id="radioSearchInput" type="text" placeholder="Nome da rádio ou cidade">
            </label>
            <label class="field">
              <span>País</span>
              <input id="radioCountrySelect" type="text" placeholder="Digite o país" autocomplete="off">
            </label>
            <label class="field">
              <span>Estado</span>
              <input id="radioStateInput" type="text" placeholder="Digite o estado" autocomplete="off">
            </label>
            <label class="field">
              <span>Cidade</span>
              <input id="radioCityInput" type="text" placeholder="Digite a cidade" autocomplete="off">
            </label>
            <label class="field">
              <span>Gênero</span>
              <select id="radioGenreSelect"></select>
            </label>
            <div class="radio-search__actions">
              <button class="button primary slim" type="submit">Buscar</button>
              <button class="button secondary slim" id="radioNearbyButton" type="button">Perto de mim</button>
            </div>
          </form>

          <div class="tag-chips" id="radioTagChips"></div>
        </div>

        <div class="radio-layout">
          <article class="radio-player glass reveal">
            <p class="eyebrow">No ar</p>
            <h3 id="radioNowPlaying">Nenhuma rádio selecionada</h3>
            <p id="radioMeta">Escolha uma estação abaixo para ouvir ao vivo.</p>
            <audio id="radioPlayer" controls preload="none"></audio>

            <details class="list-block favorites-box" open>
              <summary class="list-summary">Rádios favoritas</summary>
              <div class="favorites-list" id="radioFavorites"></div>
            </details>
          </article>

          <article class="glass reveal">
            <div class="block-heading">
              <div>
                <h3>Resultados</h3>
                <p id="radioStatus">Use os filtros e toque em Buscar para encontrar rádios.</p>
              </div>
            </div>
            <div class="radio-results" id="radioResults">
              <p class="hint">Nenhuma busca feita ainda.</p>
            </div>
          </article>
        </div>
      </section>
    </main>

        <!-- @partial footer -->
  <!-- @partial scripts-core -->
</body>
</html>
