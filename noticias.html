<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Permissions-Policy" content="geolocation=(self)">
  <meta name="theme-color" content="#08131f">
  <title>CasaClima | Notícias</title>
  <meta
    name="description"
    content="Página de notícias com categorias, miniaturas e atualização em tempo real."
  >
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%232f8fff'/%3E%3Cstop offset='1' stop-color='%23ff9f68'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='url(%23g)'/%3E%3Cpath d='M16 36c0-8.837 7.163-16 16-16 7.27 0 13.41 4.852 15.36 11.49 3.86.63 6.64 3.87 6.64 7.76 0 4.42-3.58 8-8 8H23c-3.866 0-7-3.134-7-7 0-2.09.918-3.966 2.374-5.25A9.96 9.96 0 0 1 16 36Z' fill='white' opacity='.95'/%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
  <link rel="preconnect" href="https://images.pexels.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="js/scene-head.js"></script>
  <link rel="stylesheet" href="css/bundle.css">
    <script src="js/scene-assets.js"></script>
  <script defer src="js/common.js"></script>
  <script defer src="js/news.js"></script>
</head>
<body class="theme-dark user-dark has-weather-fade scene-ready page-noticias">
    <!-- @partial shell-top -->
    <!-- @partial header -->
<main>
      <section class="section page-content" id="noticias">
        <div class="section-heading reveal">
          <div>
            <p class="eyebrow">Notícias</p>
            <h2>Painéis de leitura</h2>
          </div>
          <div class="section-heading__actions">
            <button class="button ghost slim" id="refreshNewsButton" type="button">Atualizar</button>
          </div>
        </div>

        <div class="news-grid">
          <article class="news-column glass reveal">
            <div class="block-heading">
              <div>
                <h3 id="newsTitle0">Futebol</h3>
                <p id="newsSource0">Fonte: ge.globo</p>
              </div>
              <span class="status-badge" id="status-news-0">Carregando</span>
            </div>
            <label class="field field--full news-filter">
              <span>Categoria</span>
              <select class="news-topic-select" data-slot="0"></select>
            </label>
            <div class="news-list" id="feed-news-0"></div>
          </article>

          <article class="news-column glass reveal">
            <div class="block-heading">
              <div>
                <h3 id="newsTitle1">Política</h3>
                <p id="newsSource1">Fonte: Agência Brasil</p>
              </div>
              <span class="status-badge" id="status-news-1">Carregando</span>
            </div>
            <label class="field field--full news-filter">
              <span>Categoria</span>
              <select class="news-topic-select" data-slot="1"></select>
            </label>
            <div class="news-list" id="feed-news-1"></div>
          </article>

          <article class="news-column glass reveal">
            <div class="block-heading">
              <div>
                <h3 id="newsTitle2">Mundo</h3>
                <p id="newsSource2">Fonte: BBC</p>
              </div>
              <span class="status-badge" id="status-news-2">Carregando</span>
            </div>
            <label class="field field--full news-filter">
              <span>Categoria</span>
              <select class="news-topic-select" data-slot="2"></select>
            </label>
            <div class="news-list" id="feed-news-2"></div>
          </article>
        </div>
      </section>
    </main>

        <!-- @partial footer -->
  <!-- @partial scripts-core -->
</body>
</html>
