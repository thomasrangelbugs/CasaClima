<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Permissions-Policy" content="geolocation=(self)">
  <meta name="theme-color" content="#08131f">
  <title>CasaClima | Utilidades</title>
  <meta
    name="description"
    content="Checklist, contatos, notas e busca de serviços perto de você."
  >
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%232f8fff'/%3E%3Cstop offset='1' stop-color='%23ff9f68'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='url(%23g)'/%3E%3Cpath d='M16 36c0-8.837 7.163-16 16-16 7.27 0 13.41 4.852 15.36 11.49 3.86.63 6.64 3.87 6.64 7.76 0 4.42-3.58 8-8 8H23c-3.866 0-7-3.134-7-7 0-2.09.918-3.966 2.374-5.25A9.96 9.96 0 0 1 16 36Z' fill='white' opacity='.95'/%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
  <link rel="preconnect" href="https://images.pexels.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="js/scene-head.js"></script>
  <link rel="stylesheet" href="css/bundle.css">
    <script src="js/scene-assets.js"></script>
  <script defer src="js/common.js"></script>
  <script defer src="js/utilities.js"></script>
</head>
<body class="theme-dark user-dark has-weather-fade scene-ready page-utilidades">
    <!-- @partial shell-top -->
    <!-- @partial header -->
<main>
      <section class="section page-content" id="utilidades">
        <div class="section-heading reveal">
          <div>
            <p class="eyebrow">Utilidades</p>
            <h2>Casa e região</h2>
          </div>
        </div>

        <article class="utility-card utility-card--wide glass reveal route-dashboard">
          <div class="block-heading block-heading--tight">
            <h3>Rota no mapa</h3>
            <p class="hint" id="routeStatus">Informe um destino para traçar a rota a partir da sua localização.</p>
          </div>
          <form class="inline-form" id="routeForm">
            <label class="field field--grow">
              <span>Destino</span>
              <input id="routeDestinationInput" type="search" placeholder="Endereço ou lugar" required>
            </label>
            <button class="button primary slim" type="submit">Traçar rota</button>
          </form>
          <p class="hint" id="routeDestinationLabel"></p>
          <div class="route-map" id="routeMap" aria-label="Mapa de rota"></div>
        </article>

        <div class="utility-grid utility-grid--services">
          <article class="utility-card utility-card--wide glass reveal">
            <div class="block-heading block-heading--tight">
              <h3>Perto de você</h3>
            </div>

            <div class="place-category-chips" id="utilityPlaceChips" aria-label="Categorias de busca"></div>

            <form class="place-search" id="utilityPlaceSearchForm">
              <label class="field">
                <span>Categoria</span>
                <select id="utilityPlaceCategorySelect">
                  <option value="market">Mercados</option>
                  <option value="pharmacy">Farmácias</option>
                  <option value="fuel">Postos</option>
                  <option value="gas">Gás</option>
                  <option value="hospital">Saúde</option>
                  <option value="bank">Bancos</option>
                  <option value="snack">Lanchonetes</option>
                  <option value="bakery">Padarias</option>
                  <option value="hotel">Hotéis</option>
                  <option value="mechanic">Mecânicos</option>
                  <option value="electrician">Eletricistas</option>
                  <option value="plumber">Encanadores</option>
                  <option value="hardware">Ferragens</option>
                  <option value="pet">Pet shops</option>
                  <option value="laundry">Lavanderias</option>
                  <option value="dentist">Dentistas</option>
                  <option value="gym">Academias</option>
                  <option value="school">Escolas</option>
                  <option value="police">Polícia</option>
                  <option value="transport">Transporte</option>
                  <option value="parking">Estacionamentos</option>
                </select>
              </label>

              <label class="field">
                <span>Filtrar</span>
                <input id="utilityPlaceKeywordInput" type="search" placeholder="Nome ou bairro" autocomplete="off">
              </label>

              <label class="field">
                <span>Raio</span>
                <select id="utilityPlaceRadiusSelect">
                  <option value="3000">3 km</option>
                  <option value="8000" selected>8 km</option>
                  <option value="15000">15 km</option>
                </select>
              </label>

              <div class="place-search__actions">
                <button class="button primary slim" type="submit">Buscar</button>
              </div>
            </form>

            <p class="hint utility-place-status" id="utilityPlaceStatus">Carregando região...</p>
            <div class="utility-place-loading" id="utilityPlaceLoading" hidden aria-hidden="true">
              <span></span>
            </div>

            <div class="place-list" id="utilityPlaceResults"></div>
          </article>

          <article class="utility-card glass reveal">
            <div class="block-heading block-heading--tight">
              <h3>Favoritos</h3>
            </div>
            <div class="place-list" id="utilityPlaceFavorites"></div>
          </article>

          <article class="utility-card glass reveal">
            <div class="block-heading block-heading--tight">
              <h3>Checklist</h3>
            </div>

            <form class="inline-form" id="taskForm">
              <input id="taskInput" type="text" placeholder="Nova tarefa" required>
              <button class="button secondary slim" type="submit">+</button>
            </form>

            <div class="task-list" id="taskList"></div>
          </article>

          <article class="utility-card glass reveal">
            <div class="block-heading block-heading--tight">
              <h3>Contatos</h3>
              <button class="button secondary slim" id="addContactButton" type="button">+</button>
            </div>

            <div class="contact-list" id="contactList"></div>
          </article>

          <article class="utility-card glass reveal">
            <div class="block-heading block-heading--tight">
              <h3>Notas</h3>
            </div>

            <label class="field field--full">
              <span class="sr-only">Anotações</span>
              <textarea id="homeNotes" rows="8" placeholder="Lembretes da casa"></textarea>
            </label>

            <div class="tips-panel tips-panel--compact">
              <h3>Hoje</h3>
              <ul class="plain-list" id="homeTipsList"></ul>
            </div>
          </article>
        </div>
      </section>
    </main>

        <!-- @partial footer -->
  <!-- @partial scripts-core -->
</body>
</html>
